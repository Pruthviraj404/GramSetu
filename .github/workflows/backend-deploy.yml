name: Backend CI/CD Pipeline


on:
    push:
        branches: [main]
        paths:
            - 'gramsetu_backend/**'

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Set up JDK 17
            uses: actions/setup-java@v4
            with:
                java-version: '17'
                distribution: 'temurin'
                cache: maven

          - name: Build with Maven Wrapper
            run: |
                cd gramsetu_backend
                chmod +x mvnw
                ./mvnw clean package -DskipTests

          - name: Login in to Docker Hub
            uses: docker/login-action@v3
            with:
                username: ${{secrets.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

          - name: Build and Push Docker Image
            uses: docker/build-push-action@v5
            
            with:
                context: ./gramsetu_backend
                file: ./gramsetu_backend/Dockerfile
                push: true
                tags: pruthviraj404/gramsetu_backend:v1

          - name: Deploy to Aws Ec2 via SSH
            uses: appleboy/ssh-action@v0.1.10
            with:
              host: ${{secrets.EC2_HOST}}
              username: ${{secrets.EC2_USER}}
              key: ${{secrets.EC2_SSH_KEY}}
              script: |
                docker stop gramsetu_backend_prod || true
                docker rm gramsetu_backend_prod || true
                docker pull pruthviraj404/gramsetu_backend:v1
                docker run -d \
                  -p 9090:8081 \
                  --name gramsetu_backend_prod \
                  --restart unless-stopped \
                  pruthviraj404/gramsetu_backend:v1





